{{ define "main" }}
<section class="articles-section content">
    <h1 class="title text-center">{{ .Title }}</h1>

    {{ .Content }}

    <div class="articles-list mt-5">
        {{ range .Pages.GroupByDate "2006" }}
            <h2 class="h4 mb-4">{{ .Key }}</h2>
            <div>
                {{ range .Pages }}
                    {{ partial "article-list-item.html" . }}
                {{ end }}
            </div>
        {{ end }}
    </div>
</section>
{{ end }}
