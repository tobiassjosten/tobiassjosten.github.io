{{ define "main" }}
<section class="articles-section content">
    <h1 class="title text-center">{{ .Title }}</h1>

    {{ .Content }}

    <div class="articles-list mt-5">
        <h2 class="h4 mb-4">All Articles</h2>
        <div class="row g-4">
            {{ range .Pages }}
            <div class="col-12">
                <article class="post-summary">
                    <h3 class="h5"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
                    <p class="text-muted mb-2">
                        <time>{{ .Date.Format "January 2, 2006" }}</time>
                    </p>
                    {{ with .Summary }}
                    <p>{{ . }}</p>
                    {{ end }}
                </article>
            </div>
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
