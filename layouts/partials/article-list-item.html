<article class="article-list-item mt-4 mb-4">
    <h3 class="article-title mb-1">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h3>
    <time class="article-date text-muted" datetime="{{ .Date.Format "2006-01-02" }}">
        {{ .Date.Format "January 2, 2006" }}
    </time>
</article>
