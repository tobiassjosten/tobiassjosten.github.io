<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    {{ partial "header.html" . }}

    <main id="main" class="container py-5">
        {{ if .Params.notice }}
            <div class="alert alert-info notice" role="alert">
                {{ .Params.notice | markdownify }}
            </div>
        {{ end }}

        {{ block "main" . }}
        {{ end }}
    </main>

    {{ partial "footer.html" . }}
    {{ partial "scripts.html" . }}
</body>
</html>
