name: Deploy to Cloudflare Pages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Validate site
        run: go test ./tests/...

      - name: Build site
        run: |
          hugo --environment production \
               --destination public \
               --cleanDestinationDir \
               --gc \
               --minify \
               --panicOnWarning \
               --printPathWarnings

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler pages deploy public --project-name=tobiassjosten-net --branch=main
