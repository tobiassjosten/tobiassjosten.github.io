testimonials:
  - name: "Mehdi Mokhtari"
    title: "Senior Technical Product Owner"
    text: "Tobias is an exceptional leader and a remarkable individual. It is without reservation that I endorse Tobias. His proven ability to drive innovation, lead high-performing teams, and deliver transformative results will undoubtedly make him a valuable asset to any organization. I am confident that Tobias will excel in his future endeavors, just as he has consistently done throughout his career."

  - name: "Johan Reimann"
    title: "Fullstack Engineer"
    text: "Tobias created a safe and encouraging space for you to grow under his supervision. I was always impressed by how he could balance the handling of employees and at the same time drive the organization forward with new architectural ideas. It’s hard to find a better developer who combines their technical and educational skills with their leadership talent. He is the best manager I’ve had and would recommend him in an instant. I hope to work with him again in the future."

  - name: "Jakob Persson"
    title: "Executive Consultant"
    text: "Tobias is a very creative and pragmatic software engineer with the ability to quickly come up with effective solutions. We were fortunate enough to have Tobias in our team in the early days of our company and it's no overstatement to say that Tobias's efforts were a key factor for our success. He's also a great communicator and a very appreciated and value colleague who doesn't mind helping others grow and hone their skills."

  - name: "Hannes Lilljequist"
    title: "Tech Lead, Solutions Architect"
    text: "I’ve known Tobias professionally for many years now and I can really attest to his values as a person and a professional. Tobias is a solid senior developer with years of experience with software design. I feel like Tobias always strives to find the best solutions to every problem, and he’s not afraid to challenge the status quo. Having said that, I think he has found a healthy balance between theory and pragmatism in his work, and he is also keen to have the whole team pulling in the same direction."

  - name: "Mariya Lysenkova Wiklander"
    title: "Senior Software Engineer"
    text: "Tobias is hands-down the best Drupal developer I have ever worked with. He has a brilliant mind for engineering and approaches each solution with consideration of its long-term impact, preferring to solve problems the right way over quick fixes. To say that he is a top expert in our field is an understatement. Besides giving his all to whatever task he is working on, he has an insatiable thirst for knowledge and can be spotted at tech talks or reading tech articles in much of his spare time. Tobias has been a reliable, dedicated and very much appreciated member of our team. He also happens to be one of the most genuinely helpful and kind people I've met."

  - name: "Joakim Lundberg"
    title: "Senior Web Developer"
    text: "Tobias passion for the web, his expertise, helpfulness and patience makes him a great asset to any team. There is always a solution to everything with Tobias at your side. He is a driven person with great ambitions and all the prerequisites for achieving them, and I hope to have the pleasure to work with him again one day."

  - name: "Linus Lennstrand"
    title: "CTO, CPO, CEO"
    text: "I hired Tobias to provide specialist knowledge in a web project with the purpose to re-implement one of Sweden's largest sites. Tobias and his colleagues worked very well with the rest of the team and provided highly valuable expertise in the area at hand. As a consultant Tobias was very service minded and produced great results in a short time at a very good value. I would recommend Tobias to anyone who wants a skilled and service minded developer/architect in the open source field."

  - name: "Stefan Ronge "
    title: "CEO, CCO"
    text: "Over the last year we've hired Tobias on numerous occasions, always with impeccable results. Not only is he one hell of a developer, but a stand-up guy. Needless to say, I would highly recommend him to anyone looking for solid web development."

  - name: "Christian Burger"
    title: "CTO"
    text: "Tobias is a terrific resource for us. He is very methodical in his approach, pays attention to detail and is very resourceful in solving problems. He has a wonderful work ethic, is always keen to learn and takes pride in what he does."
